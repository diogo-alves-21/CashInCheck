      signed_up_but_locked: You have successfully signed up, but we cannot sign you in because your account is locked.
      signed_up_but_unconfirmed: A confirmation email has been sent to your email address. Please open the link to activate your account.
      update_needs_confirmation: Your account has been successfully updated, but we need to confirm your email. Please check your email and click the link to finalize the confirmation of your email.
      updated: Your account has been successfully updated.
